<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GrandmasterJS - Advanced AI Chess</title>
    <link rel="stylesheet" href="./style.css"/>
</head>
<body>

<div id="app-container">
    <div id="board-container">
        <div id="main-board" class="board"></div>
    </div>

    <div id="sidebar">
        <div class="panel">
            <div id="game-status" class="status-badge">WHITE TO MOVE</div>
            <div class="eval-bar"><div id="eval-fill"></div></div>
            <div id="eval-text" style="text-align: center; font-size: 12px;">Eval: 0.0</div>
        </div>

        <div class="panel">
            <div style="margin-bottom: 5px; font-size: 12px; color: #aaa;">MOVE HISTORY</div>
            <div id="history" class="move-history"></div>
        </div>

        <div class="panel controls">
            <button onclick="gameUI.undo()">UNDO</button>
            <button onclick="gameUI.reset()">RESET</button>
            <button id="ai-toggle" onclick="gameUI.toggleAI()">AI: ON</button>
            <select id="difficulty" onchange="gameUI.setDifficulty(this.value)">
                <option value="2">Casual (D2)</option>
                <option value="3" selected>Amateur (D3)</option>
                <option value="4">Expert (D4)</option>
            </select>
        </div>

        <div class="panel" style="font-size: 11px; color: #888;">
            <strong>Engine:</strong> Minimax + Alpha-Beta Pruning<br>
            <strong>Optimization:</strong> Move Ordering, PST, Transposition Table (Zobrist)
        </div>
    </div>
</div>

<script src="./app.js">
</script>
</body>
</html>
