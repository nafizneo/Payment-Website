<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Evolution - CS Demo</title>
	
    <style href="./style.css" rel="stylesheet"></style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div class="hud">
        <div id="scoreDisplay">0</div>
        <div id="highScoreDisplay" style="font-size: 18px; color: #eee; opacity: 0.8;">BEST: 0</div>
    </div>

    <!-- Start Menu -->
    <div id="startMenu" class="ui-layer">
        <div class="menu-overlay">
            <h1 style="margin: 0; color: #f1c40f; font-size: 42px;">FLAPPY CS</h1>
            <p>A Neural Network Evolution Demo</p>
            <button onclick="game.start()">PLAY GAME</button>
            <p style="font-size: 12px; margin-top: 15px; color: #aaa;">SPACE/CLICK to Jump | 'A' for AI Mode</p>
        </div>
    </div>

    <!-- Ready Screen (The "Tap to Start" state) -->
    <div id="readyScreen" class="ui-layer hidden">
        <h2 style="font-size: 40px; text-shadow: 3px 3px 0 #000; margin-bottom: 80px;">GET READY</h2>
        <div class="tap-indicator">TAP OR SPACE TO START</div>
    </div>

    <!-- Game Over -->
    <div id="gameOverMenu" class="ui-layer hidden">
        <div class="menu-overlay">
            <h2 id="endStatus" style="color: #ff4757;">CRASHED!</h2>
            <p id="finalScore" style="font-size: 24px;">Score: 0</p>
            <button onclick="game.restart()">RETRY</button>
        </div>
    </div>

    <div id="aiIndicator" class="ai-badge hidden">AI AUTOPILOT</div>
</div>

	<script src="./app.js"></script>
</body>
</html>
