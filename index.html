<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flappy Evolution - CS Demo</title>
	
    <style>
        :root {
            --primary: #70c5ce;
            --ui-bg: rgba(0, 0, 0, 0.7);
            --text: white;
            --accent: #f1c40f;
        }
        body {
            margin: 0;
            padding: 0;
            background: #1a1a1a;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: var(--text);
        }
        #game-container {
            position: relative;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 6px solid #333;
            border-radius: 12px;
            overflow: hidden;
        }
        canvas {
            display: block;
            background: var(--primary);
        }
        .ui-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            z-index: 10;
        }
        .hud {
            position: absolute;
            top: 20px;
            width: 100%;
            display: flex;
            justify-content: space-around;
            pointer-events: none;
            font-size: 28px;
            font-weight: 800;
            text-shadow: 2px 2px 0 #000;
            z-index: 20;
        }
        .menu-overlay {
            background: var(--ui-bg);
            padding: 2.5rem;
            border-radius: 20px;
            pointer-events: all;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.1);
        }
        .hidden { display: none !important; }
        
        /* Animations */
        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }
        .tap-indicator {
            font-size: 20px;
            color: var(--accent);
            margin-top: 20px;
            font-weight: bold;
            animation: pulse 1.5s infinite;
        }

        button {
            padding: 12px 30px;
            font-size: 20px;
            cursor: pointer;
            background: #ff9f43;
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            box-shadow: 0 4px 0 #cc8135;
            transition: all 0.1s;
        }
        button:active {
            transform: translateY(2px);
            box-shadow: 0 2px 0 #cc8135;
        }
        .ai-badge {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: #ee5253;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: bold;
            border: 1px solid rgba(255,255,255,0.2);
        }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>
    
    <div class="hud">
        <div id="scoreDisplay">0</div>
        <div id="highScoreDisplay" style="font-size: 18px; color: #eee; opacity: 0.8;">BEST: 0</div>
    </div>

    <!-- Start Menu -->
    <div id="startMenu" class="ui-layer">
        <div class="menu-overlay">
            <h1 style="margin: 0; color: #f1c40f; font-size: 42px;">FLAPPY CS</h1>
            <p>A Neural Network Evolution Demo</p>
            <button onclick="game.start()">PLAY GAME</button>
            <p style="font-size: 12px; margin-top: 15px; color: #aaa;">SPACE/CLICK to Jump | 'A' for AI Mode</p>
        </div>
    </div>

    <!-- Ready Screen (The "Tap to Start" state) -->
    <div id="readyScreen" class="ui-layer hidden">
        <h2 style="font-size: 40px; text-shadow: 3px 3px 0 #000; margin-bottom: 80px;">GET READY</h2>
        <div class="tap-indicator">TAP OR SPACE TO START</div>
    </div>

    <!-- Game Over -->
    <div id="gameOverMenu" class="ui-layer hidden">
        <div class="menu-overlay">
            <h2 id="endStatus" style="color: #ff4757;">CRASHED!</h2>
            <p id="finalScore" style="font-size: 24px;">Score: 0</p>
            <button onclick="game.restart()">RETRY</button>
        </div>
    </div>

    <div id="aiIndicator" class="ai-badge hidden">AI AUTOPILOT</div>
</div>

	<script src="./app.js"></script>
</body>
</html>
